<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Recreo Turístico</h1>
        <h1> EL RINCONCITO</h1>
        <nav>
            <ul>
                <li><a href="inicio.html">inicio</a></li>
                <li><a href="servicios.html">servicios</a></li>
                <li><a href="galeria.html">galeria</a></li>
                <li><a href="reservas.html">reservas</a></li>
                <li><a href="contacto.html">contacto</a></li>
            </ul>
        </nav>
    <header>
    <h1>🌴 Recreo Turístico Paraíso Natural</h1>
    <p>Reserva tu día de descanso y diversión</p>
</header>

<section class="contenedor">

    <div class="imagen">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" 
        alt="Recreo turístico">
    </div>

    <form class="formulario">

        <h2>Formulario de Reserva</h2>

        <label>Nombre completo:</label>
        <input type="text" placeholder="Ingrese su nombre" required>

        <label>Correo electrónico:</label>
        <input type="email" placeholder="ejemplo@gmail.com" required>

        <label>Teléfono:</label>
        <input type="tel" placeholder="999999999">

        <label>Fecha de visita:</label>
        <input type="date" required>

        <label>Número de personas:</label>
        <input type="number" min="1" max="100" value="1">

        <label>Servicio:</label>
        <select>
            <option>Entrada general</option>
            <option>Zona VIP</option>
            <option>Almuerzo incluido</option>
            <option>Paquete familiar</option>
        </select>

        <label>Mensaje adicional:</label>
        <textarea placeholder="Escriba alguna solicitud"></textarea>

        <button type="submit">
            Reservar ahora
        </button>

    </form>

</section>

<footer>
    <p>© 2026 Recreo Turístico Paraíso Natural | Vive una experiencia inolvidable 🌿</p>
</footer>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:#e8f7f1;
    color:#333;
}

header{
    background:linear-gradient(135deg,#009688,#00695c);
    color:white;
    text-align:center;
    padding:35px;
}

header h1{
    font-size:38px;
}

header p{
    margin-top:10px;
    font-size:18px;
}


.contenedor{
    width:90%;
    max-width:1100px;
    margin:40px auto;
    display:flex;
    gap:30px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}


.imagen{
    width:50%;
}

.imagen img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:15px;
}


.formulario{
    width:50%;
    display:flex;
    flex-direction:column;
}


.formulario h2{
    color:#00796b;
    margin-bottom:20px;
}


label{
    margin-top:12px;
    font-weight:bold;
}


input,
select,
textarea{
    margin-top:5px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}


textarea{
    resize:none;
    height:90px;
}


button{
    margin-top:25px;
    padding:15px;
    background:#009688;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}


button:hover{
    background:#00695c;
    transform:scale(1.03);
}


footer{
    background:#004d40;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}


/* Diseño para celulares */

@media(max-width:800px){

    .contenedor{
        flex-direction:column;
    }

    .imagen,
    .formulario{
        width:100%;
    }

    header h1{
        font-size:28px;
    }

}
</style>

</body>
</html>
